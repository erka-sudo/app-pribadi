<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jadwal Shalat & Kiblat</title>

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f5f7fb;
}

.header{
background:linear-gradient(90deg,#0b5ed7,#3a86ff);
color:white;
padding:14px;
text-align:center;
font-size:18px;
}

#map{
height:45vh;
}

.panel{
background:white;
padding:14px;
border-radius:12px 12px 0 0;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
background:#0b5ed7;
color:white;
border-radius:6px;
cursor:pointer;
margin:3px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#eef3ff;
padding:8px;
}

td{
padding:7px;
border-bottom:1px solid #eee;
text-align:center;
}

/* KOMPAS KUNO */

#compassBox{

position:relative;
width:220px;
height:220px;
margin:auto;
margin-top:10px;

}

#compassBase{

width:220px;
position:absolute;
top:0;
left:0;

}

#northPointer{

width:80px;
position:absolute;
top:70px;
left:70px;
transform-origin:center center;

}

/* RAMADAN BALLOON */

#ramadanBalloon{
display:none;
position:fixed;
bottom:40px;
right:40px;
background:#ff4d4d;
color:white;
padding:25px 30px;
font-size:30px;
border-radius:50px;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
z-index:999;
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}

}

</style>
</head>

<body>

<div class="header">
Jadwal Shalat • Peta • Arah Kiblat
</div>

<div id="map"></div>

<div class="panel">

<button onclick="getGPS()">GPS</button>
<button onclick="useMapPoint()">Pilih dari Peta</button>

<div id="locationText">Lokasi: -</div>

<h3 id="calendarText"></h3>

<table>

<tr>
<th>Subuh</th>
<th>Syuruq</th>
<th>Dzuhur</th>
<th>Ashar</th>
<th>Maghrib</th>
<th>Isya</th>
</tr>

<tr>
<td id="fajr"></td>
<td id="sunrise"></td>
<td id="dhuhr"></td>
<td id="asr"></td>
<td id="maghrib"></td>
<td id="isha"></td>
</tr>

</table>

<h3 style="text-align:center">Arah Kiblat</h3>

<div style="text-align:center">

<div id="qiblaAngle" style="font-size:22px;font-weight:bold"></div>

<div id="compassBox">

<img id="compassBase"
src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Compass_rose_pale.svg">

<img id="northPointer"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/North_arrow.svg/512px-North_arrow.svg.png">

</div>

<div id="headingText" style="margin-top:8px"></div>

</div>

</div>

<div id="ramadanBalloon"></div>

<script>

/* ================= MAP ================= */

let lat=0
let lon=0

let map=new maplibregl.Map({
container:"map",
style:{
version:8,
sources:{
esri:{
type:"raster",
tiles:[
"https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
],
tileSize:256
}
},
layers:[{id:"esri",type:"raster",source:"esri"}]
},
center:[110,-2],
zoom:5
})

let marker=null
let selectedPoint=null

map.on("click",e=>{

selectedPoint=e.lngLat

if(marker) marker.remove()

marker=new maplibregl.Marker()
.setLngLat(e.lngLat)
.addTo(map)

})

/* ================= GPS ================= */

function getGPS(){

navigator.geolocation.getCurrentPosition(pos=>{
setLocation(pos.coords.latitude,pos.coords.longitude)
})

}

function useMapPoint(){

if(!selectedPoint) return alert("Klik peta dulu")

setLocation(selectedPoint.lat,selectedPoint.lng)

}

function setLocation(a,b){

lat=a
lon=b

map.flyTo({center:[lon,lat],zoom:14})

document.getElementById("locationText").innerText=
"Lokasi: "+lat.toFixed(5)+", "+lon.toFixed(5)

calculatePrayerTimes(new Date())
calculateQibla()

}

/* ================= MATEMATIKA ================= */

function deg2rad(d){return d*Math.PI/180}
function rad2deg(r){return r*180/Math.PI}

function dayOfYear(d){

let start=new Date(d.getFullYear(),0,0)

return Math.floor((d-start)/86400000)

}

function solarDeclination(n){

return 23.45*Math.sin(deg2rad((360/365)*(284+n)))

}

function equationOfTime(n){

let B=deg2rad((360/365)*(n-81))

return 9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B)

}

function hourAngle(lat,dec,angle){

let num=Math.sin(deg2rad(angle))-Math.sin(deg2rad(lat))*Math.sin(deg2rad(dec))

let den=Math.cos(deg2rad(lat))*Math.cos(deg2rad(dec))

return rad2deg(Math.acos(num/den))

}

/* ================= JADWAL SHALAT ================= */

function calculatePrayerTimes(date){

let n=dayOfYear(date)

let dec=solarDeclination(n)

let eot=equationOfTime(n)

let tz=-date.getTimezoneOffset()/60

let dhuhr=12+(tz*15-lon)/15-eot/60

let fajr=dhuhr-hourAngle(lat,dec,-18)/15

let sunrise=dhuhr-hourAngle(lat,dec,-0.833)/15

let maghrib=dhuhr+hourAngle(lat,dec,-0.833)/15

let isha=dhuhr+hourAngle(lat,dec,-17)/15

let asr=dhuhr+hourAngle(lat,dec,-Math.atan(1+Math.tan(Math.abs(deg2rad(lat-dec)))))/15

function format(t){

let h=Math.floor(t)

let m=Math.floor((t-h)*60)

return ("0"+h).slice(-2)+":"+("0"+m).slice(-2)

}

document.getElementById("fajr").innerText=format(fajr)
document.getElementById("sunrise").innerText=format(sunrise)
document.getElementById("dhuhr").innerText=format(dhuhr)
document.getElementById("asr").innerText=format(asr)
document.getElementById("maghrib").innerText=format(maghrib)
document.getElementById("isha").innerText=format(isha)

let hijri=new Intl.DateTimeFormat('id-TN-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(date)

document.getElementById("calendarText").innerText=
date.toLocaleDateString("id-ID",{weekday:'long',day:'numeric',month:'long',year:'numeric'})
+" | "+hijri

}

/* ================= KIBLAT ================= */

function calculateQibla(){

const KAABA_LAT=21.4225
const KAABA_LON=39.8262

let dLon=deg2rad(KAABA_LON-lon)

let y=Math.sin(dLon)*Math.cos(deg2rad(KAABA_LAT))

let x=
Math.cos(deg2rad(lat))*Math.sin(deg2rad(KAABA_LAT))-
Math.sin(deg2rad(lat))*Math.cos(deg2rad(KAABA_LAT))*Math.cos(dLon)

let qibla=(rad2deg(Math.atan2(y,x))+360)%360

document.getElementById("qiblaAngle").innerText=
"Arah Kiblat "+qibla.toFixed(1)+"°"

window.addEventListener("deviceorientationabsolute",e=>{

let heading=e.alpha

if(heading==null) return

document.getElementById("headingText").innerText=
"Arah Kompas "+heading.toFixed(1)+"°"

let rotate=qibla-heading

document.getElementById("northPointer").style.transform=
"rotate("+rotate+"deg)"

})

}

</script>

</body>
</html>
