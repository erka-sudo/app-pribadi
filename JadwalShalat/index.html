<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jadwal Shalat</title>

<link rel="stylesheet" href="style.css">

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

</head>

<body>

<div class="header">
Jadwal Shalat • Arah Kiblat
</div>

<div id="map"></div>

<div class="panel">

<button onclick="getGPS()">GPS</button>
<button onclick="useMapPoint()">Pilih dari Peta</button>
<button onclick="openMasjidMode()">Mode Masjid</button>

<div id="locationText">Lokasi: -</div>

<h3 id="calendarText"></h3>

<table id="prayTable">

<tr>
<th>Subuh</th>
<th>Syuruq</th>
<th>Dzuhur</th>
<th>Ashar</th>
<th>Maghrib</th>
<th>Isya</th>
</tr>

<tr>
<td id="fajr"></td>
<td id="sunrise"></td>
<td id="dhuhr"></td>
<td id="asr"></td>
<td id="maghrib"></td>
<td id="isha"></td>
</tr>

</table>

<h3 style="text-align:center">Arah Kiblat</h3>

<div id="qiblaAngle"></div>

<div id="compassContainer">

<svg viewBox="0 0 200 200" width="220">

<!-- lingkaran -->

<circle cx="100" cy="100" r="95"
stroke="#333"
stroke-width="6"
fill="#fafafa"/>

<!-- arah mata angin -->

<text x="100" y="20" text-anchor="middle">N</text>
<text x="180" y="105" text-anchor="middle">E</text>
<text x="100" y="195" text-anchor="middle">S</text>
<text x="20" y="105" text-anchor="middle">W</text>

<!-- garis kiblat -->

<line id="qiblaLine"
x1="100" y1="100"
x2="100" y2="10"
stroke="green"
stroke-width="6"
stroke-linecap="round"
/>

<!-- jarum kompas -->

<polygon id="compassNeedle"
points="100,20 110,100 100,90 90,100"
fill="red"
/>

</svg>

</div>

<div id="headingText"></div>

</div>


<div id="masjidMode">

<div id="masjidClock"></div>

<table id="masjidTable">

<tr>
<th>Subuh</th>
<th>Syuruq</th>
<th>Dzuhur</th>
<th>Ashar</th>
<th>Maghrib</th>
<th>Isya</th>
</tr>

<tr>
<td id="mfajr"></td>
<td id="msunrise"></td>
<td id="mdhuhr"></td>
<td id="masr"></td>
<td id="mmaghrib"></td>
<td id="misha"></td>
</tr>

</table>

<button onclick="closeMasjidMode()">Kembali</button>

</div>

<script src="script.js"></script>

</body>
</html>
