<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jadwal Shalat & Arah Kiblat</title>

<link rel="stylesheet" href="style.css">

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet">

<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

</head>

<body>

<div class="header">
Jadwal Shalat • Peta • Arah Kiblat
</div>

<div id="map"></div>

<div class="panel">

<button onclick="getGPS()">GPS</button>
<button onclick="useMapPoint()">Pilih dari Peta</button>
<button onclick="openModal()">Jadwal 1 Bulan</button>

<div id="locationText">Lokasi: -</div>

<h3 id="calendarText"></h3>

<table>

<tr>
<th>Subuh</th>
<th>Syuruq</th>
<th>Dzuhur</th>
<th>Ashar</th>
<th>Maghrib</th>
<th>Isya</th>
</tr>

<tr>
<td id="fajr"></td>
<td id="sunrise"></td>
<td id="dhuhr"></td>
<td id="asr"></td>
<td id="maghrib"></td>
<td id="isha"></td>
</tr>

</table>

<h3 style="text-align:center">Arah Kiblat</h3>

<div style="text-align:center">

<div id="qiblaAngle"></div>

<div id="compassContainer">

<svg id="compass" viewBox="0 0 200 200">

<circle cx="100" cy="100" r="95"
stroke="#333"
stroke-width="6"
fill="#fafafa"/>

<text x="100" y="20" text-anchor="middle">N</text>
<text x="180" y="105" text-anchor="middle">E</text>
<text x="100" y="195" text-anchor="middle">S</text>
<text x="20" y="105" text-anchor="middle">W</text>

<polygon id="northArrow"
points="100,30 110,100 100,90 90,100"
fill="red"/>

</svg>

</div>

<div id="headingText"></div>

</div>

</div>

<div id="ramadanBalloon"></div>

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<h3>Jadwal Shalat 1 Bulan</h3>

<table id="monthTable"></table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
