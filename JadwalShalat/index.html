<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jadwal Shalat</title>

<link rel="stylesheet" href="style.css">

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

</head>

<body>

<div class="header">
Jadwal Shalat • Arah Kiblat
</div>

<div id="map"></div>

<div class="panel">

<button onclick="getGPS()">GPS</button>
<button onclick="useMapPoint()">Pilih dari Peta</button>
<button onclick="openMasjidMode()">Mode Masjid</button>
<button onclick="openMonthly()">Jadwal 1 Bulan</button>

<button onclick="calibrateCompass()" style="background:#2e7d32;color:#fff;">
Kalibrasi Kompas
</button>

<div style="font-size:12px;margin-top:5px;color:#555;">
Arahkan HP ke <b>Utara (kompas survey)</b> lalu tekan kalibrasi
</div>

<div id="locationText">Lokasi: -</div>

<h3 id="calendarText"></h3>

<table id="prayTable">

<tr>
<th>Subuh</th>
<th>Syuruq</th>
<th>Dzuhur</th>
<th>Ashar</th>
<th>Maghrib</th>
<th>Isya</th>
</tr>

<tr>
<td id="fajr"></td>
<td id="sunrise"></td>
<td id="dhuhr"></td>
<td id="asr"></td>
<td id="maghrib"></td>
<td id="isha"></td>
</tr>

</table>

<h3 style="text-align:center">Arah Kiblat</h3>

<div id="qiblaAngle"></div>

<!-- ================= KOMPAS ================= -->
<div id="compassPro">

<div class="compass-ring"></div>

<div class="dir north">N</div>
<div class="dir east">E</div>
<div class="dir south">S</div>
<div class="dir west">W</div>

<div id="needle"></div>
<div id="qiblaArrow"></div>

</div>

<div id="headingText"></div>

</div>


<!-- ================= MODAL BULANAN ================= -->

<div id="monthlyModal">

<div class="modalContent">

<h2>Jadwal Shalat 1 Bulan</h2>

<div class="tableWrap">
<table id="monthlyTable">

<thead>
<tr>
<th>Hari</th>
<th>Masehi</th>
<th>Hijriyah</th>
<th>Subuh</th>
<th>Syuruq</th>
<th>Dzuhur</th>
<th>Ashar</th>
<th>Maghrib</th>
<th>Isya</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<button onclick="closeMonthly()">Tutup</button>

</div>

</div>


<!-- ================= MODE MASJID ================= -->

<div id="masjidMode">

<div id="masjidClock"></div>

<table id="masjidTable">

<tr>
<th>Subuh</th>
<th>Syuruq</th>
<th>Dzuhur</th>
<th>Ashar</th>
<th>Maghrib</th>
<th>Isya</th>
</tr>

<tr>
<td id="mfajr"></td>
<td id="msunrise"></td>
<td id="mdhuhr"></td>
<td id="masr"></td>
<td id="mmaghrib"></td>
<td id="misha"></td>
</tr>

</table>

<button onclick="closeMasjidMode()">Kembali</button>

</div>

<script src="script.js"></script>

</body>
</html>
