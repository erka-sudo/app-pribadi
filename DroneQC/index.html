<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Drone QC Tool</title>

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.topbar{
background:white;
padding:10px;
border-bottom:1px solid #ccc;
}

.layout{
display:flex;
height:calc(100vh - 60px);
}

.qcPanel{
width:35%;
background:white;
overflow:auto;
border-right:1px solid #ccc;
}

.right{
flex:1;
display:flex;
flex-direction:column;
}

#map{
flex:3;
}

.flightPanel{
flex:1;
background:white;
border-top:1px solid #ccc;
overflow:auto;
padding:10px;
}

.flight{
padding:6px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.flight:hover{
background:#eee;
}

.selected{
background:#cde3ff;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
}

.red{
color:red;
}

.rowHighlight{
background:#fff2a8;
}

</style>
</head>

<body>

<div class="topbar">

<input type="file" id="folder" webkitdirectory multiple>

Threshold
<input id="threshold" value="0.05" size="6">

<button onclick="loadProject()">Open Project</button>
<button onclick="zoomToFlights()">Zoom to Flight</button>
<button onclick="selectAllFlights()">Select All</button>
<button onclick="unselectAllFlights()">Unselect All</button>

Point Size
<input type="range" id="pointSize" min="4" max="14" value="6">

</div>

<div class="layout">

<div class="qcPanel">

<h3 style="margin:10px">QC Table</h3>

<table id="table">

<thead>
<tr>
<th>file</th>
<th>lat</th>
<th>lon</th>
<th>alt</th>
<th>acc_x</th>
<th>acc_y</th>
<th>acc_z</th>
<th>flight</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="right">

<div id="map"></div>

<div class="flightPanel">

<h3>Flight List</h3>

<div id="flightList"></div>

</div>

</div>

</div>

<script>

let flights={}
let selectedFlights=new Set()

let map

let markers=[]
let markerMap={}
let rowMap={}
let lastFlight=null

function initMap(){

map=new maplibregl.Map({

container:"map",

style:{
version:8,
sources:{
osm:{
type:"raster",
tiles:[
"https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
"https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
"https://c.tile.openstreetmap.org/{z}/{x}/{y}.png"
],
tileSize:256
}
},
layers:[
{
id:"osm",
type:"raster",
source:"osm"
}
]
},

center:[102.77,-2.08],
zoom:14

})

}

initMap()

document.getElementById("pointSize").addEventListener("input",drawFlights)

function getFlightName(path){

let parts=path.split("/")

if(parts.length>2) return parts[parts.length-2]

return parts[0]

}

function loadProject(){

const files=document.getElementById("folder").files

flights={}
selectedFlights.clear()

for(let file of files){

if(file.name.endsWith(".MRK")){

let flight=getFlightName(file.webkitRelativePath)

if(!flights[flight]) flights[flight]={mrk:null,jpgs:[],points:[]}

flights[flight].mrk=file

}

if(file.name.endsWith("_V.JPG")){

let flight=getFlightName(file.webkitRelativePath)

if(!flights[flight]) flights[flight]={mrk:null,jpgs:[],points:[]}

flights[flight].jpgs.push(file.name)

}

}

for(let f in flights){

flights[f].jpgs.sort()

}

readMRK()

}

function readMRK(){

for(let f in flights){

let file=flights[f].mrk

if(!file) continue

let reader=new FileReader()

reader.onload=function(e){

parseMRK(e.target.result,f)

}

reader.readAsText(file)

}

setTimeout(buildFlightList,600)

}

function parseMRK(text,flight){

const lines=text.split("\n")

let points=[]

for(let line of lines){

const lat=line.match(/(-?\d+\.\d+),Lat/)
const lon=line.match(/(-?\d+\.\d+),Lon/)
const alt=line.match(/(-?\d+\.\d+),Ellh/)
const acc=line.match(/(\d+\.\d+),\s*(\d+\.\d+),\s*(\d+\.\d+)/)

if(!lat) continue

points.push({

file:null,
lat:parseFloat(lat[1]),
lon:parseFloat(lon[1]),
alt:parseFloat(alt[1]),
ax:parseFloat(acc[1]),
ay:parseFloat(acc[2]),
az:parseFloat(acc[3])

})

}

let jpgs=flights[flight].jpgs

for(let i=0;i<Math.min(points.length,jpgs.length);i++){

points[i].file=jpgs[i]

}

flights[flight].points=points

}

function buildFlightList(){

const div=document.getElementById("flightList")

div.innerHTML=""

for(let f in flights){

let el=document.createElement("div")

el.className="flight"
el.dataset.flight=f
el.innerText=f+" ("+flights[f].points.length+")"

el.onclick=function(e){

toggleFlight(f,el,e)

}

div.appendChild(el)

}

}

function toggleFlight(f,el,event){

if(event.shiftKey && lastFlight){

let list=Object.keys(flights)

let start=list.indexOf(lastFlight)
let end=list.indexOf(f)

let min=Math.min(start,end)
let max=Math.max(start,end)

for(let i=min;i<=max;i++){

selectedFlights.add(list[i])

document.querySelector(`[data-flight="${list[i]}"]`).classList.add("selected")

}

}else{

if(selectedFlights.has(f)){

selectedFlights.delete(f)
el.classList.remove("selected")

}else{

selectedFlights.add(f)
el.classList.add("selected")

}

}

lastFlight=f

drawFlights()

}

function selectAllFlights(){

selectedFlights.clear()

document.querySelectorAll(".flight").forEach(el=>{

selectedFlights.add(el.dataset.flight)
el.classList.add("selected")

})

drawFlights()

}

function unselectAllFlights(){

selectedFlights.clear()

document.querySelectorAll(".flight").forEach(el=>{

el.classList.remove("selected")

})

drawFlights()

}

function clearMarkers(){

for(let m of markers) m.remove()

markers=[]

markerMap={}
rowMap={}

}

function drawFlights(){

clearMarkers()

const tbody=document.querySelector("#table tbody")
tbody.innerHTML=""

let size=document.getElementById("pointSize").value
let threshold=parseFloat(document.getElementById("threshold").value)

let id=0

for(let f of selectedFlights){

for(let p of flights[f].points){

let acc=Math.max(p.ax,p.ay,p.az)

let color = acc>threshold ? "red" : "#00ff00"

let el=document.createElement("div")

el.style.width=size+"px"
el.style.height=size+"px"
el.style.borderRadius="50%"
el.style.background=color
el.style.cursor="pointer"

let marker=new maplibregl.Marker(el)
.setLngLat([p.lon,p.lat])
.addTo(map)

markers.push(marker)

markerMap[id]=el

el.onclick=()=>selectPoint(id,p)

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${p.file||""}</td>
<td>${p.lat}</td>
<td>${p.lon}</td>
<td>${p.alt}</td>
<td>${p.ax}</td>
<td>${p.ay}</td>
<td>${p.az}</td>
<td>${f}</td>
`

if(acc>threshold) tr.classList.add("red")

tr.onclick=()=>selectPoint(id,p)

tbody.appendChild(tr)

rowMap[id]=tr

id++

}

}

}

function selectPoint(id,p){

for(let k in markerMap){

markerMap[k].style.border="none"

}

markerMap[id].style.border="3px solid yellow"

for(let r in rowMap){

rowMap[r].classList.remove("rowHighlight")

}

rowMap[id].classList.add("rowHighlight")

rowMap[id].scrollIntoView({block:"center"})

map.flyTo({center:[p.lon,p.lat],zoom:18})

}

function zoomToFlights(){

let bounds=new maplibregl.LngLatBounds()

for(let f of selectedFlights){

for(let p of flights[f].points){

bounds.extend([p.lon,p.lat])

}

}

if(!bounds.isEmpty()){

map.fitBounds(bounds,{padding:40})

}

}

</script>

</body>
</html>
