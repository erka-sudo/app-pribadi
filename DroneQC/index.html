<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Drone QC Tool (WebGL)</title>

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.topbar{
background:white;
padding:10px;
border-bottom:1px solid #ccc;
}

.layout{
display:flex;
height:calc(100vh - 60px);
}

.qcPanel{
width:35%;
overflow:auto;
background:white;
border-right:1px solid #ccc;
}

.right{
flex:1;
display:flex;
flex-direction:column;
}

#map{
flex:3;
}

.flightPanel{
flex:1;
overflow:auto;
background:white;
border-top:1px solid #ccc;
padding:10px;
}

.flight{
padding:6px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.flight:hover{
background:#eee;
}

.selected{
background:#cde3ff;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
}

.red{
color:red;
}

.highlight{
background:#fff2a8;
}

</style>
</head>


<body>

<div class="topbar">

<input type="file" id="folder" webkitdirectory multiple>

Threshold
<input id="threshold" value="0.05" size="6">

<button onclick="loadProject()">Open Project</button>
<button onclick="zoomToFlights()">Zoom to Flight</button>

Point Size
<input type="range" id="pointSize" min="3" max="12" value="6">

</div>


<div class="layout">

<div class="qcPanel">

<h3 style="margin:10px">QC Table</h3>

<table id="table">

<thead>
<tr>
<th>ID</th>
<th>lat</th>
<th>lon</th>
<th>alt</th>
<th>acc_x</th>
<th>acc_y</th>
<th>acc_z</th>
<th>flight</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<div class="right">

<div id="map"></div>

<div class="flightPanel">

<h3>Flight List</h3>
<div id="flightList"></div>

</div>

</div>

</div>



<script>

let map
let flights={}
let selectedFlights=new Set()

let featureCollection={
"type":"FeatureCollection",
"features":[]
}

let rowById={}
let pointById={}

function initMap(){

map=new maplibregl.Map({

container:"map",

style:{
version:8,
sources:{
osm:{
type:"raster",
tiles:[
"https://a.tile.openstreetmap.org/{z}/{x}/{y}.png"
],
tileSize:256
}
},
layers:[
{
id:"osm",
type:"raster",
source:"osm"
}
]
},

center:[102.77,-2.08],
zoom:14

})

map.on("load",()=>{

map.addSource("points",{
type:"geojson",
data:featureCollection
})

map.addLayer({
id:"points",
type:"circle",
source:"points",
paint:{
"circle-radius":6,
"circle-color":[
"case",
[">",["get","acc"],0.05],
"#ff0000",
"#00ff00"
],
"circle-stroke-width":1,
"circle-stroke-color":"#000"
}
})

map.addLayer({
id:"highlight",
type:"circle",
source:"points",
paint:{
"circle-radius":10,
"circle-color":"#ffff00"
},
filter:["==","id",-1]
})

})

}

initMap()


document.getElementById("pointSize").addEventListener("input",()=>{

let size=parseInt(document.getElementById("pointSize").value)

map.setPaintProperty("points","circle-radius",size)

})

document.getElementById("threshold").addEventListener("input",updateThreshold)



function updateThreshold(){

let t=parseFloat(document.getElementById("threshold").value)

map.setPaintProperty("points","circle-color",[

"case",
[">",["get","acc"],t],
"#ff0000",
"#00ff00"

])

}



function loadProject(){

const files=document.getElementById("folder").files

flights={}

for(let file of files){

if(file.name.endsWith(".MRK")){

let parts=file.webkitRelativePath.split("/")
let flight=parts[parts.length-2]

flights[flight]=file

}

}

readMRK()

}



function readMRK(){

featureCollection.features=[]

let tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

let id=0

for(let f in flights){

let reader=new FileReader()

reader.onload=function(e){

let lines=e.target.result.split("\n")

for(let line of lines){

let lat=line.match(/(-?\d+\.\d+),Lat/)
let lon=line.match(/(-?\d+\.\d+),Lon/)
let alt=line.match(/(-?\d+\.\d+),Ellh/)
let acc=line.match(/(\d+\.\d+),\s*(\d+\.\d+),\s*(\d+\.\d+)/)

if(!lat) continue

let p={
lat:parseFloat(lat[1]),
lon:parseFloat(lon[1]),
alt:parseFloat(alt[1]),
ax:parseFloat(acc[1]),
ay:parseFloat(acc[2]),
az:parseFloat(acc[3])
}

let accmax=Math.max(p.ax,p.ay,p.az)

featureCollection.features.push({

type:"Feature",

id:id,

properties:{
id:id,
acc:accmax
},

geometry:{
type:"Point",
coordinates:[p.lon,p.lat]
}

})

let tr=document.createElement("tr")

if(accmax>0.05) tr.classList.add("red")

tr.innerHTML=`
<td>${id}</td>
<td>${p.lat}</td>
<td>${p.lon}</td>
<td>${p.alt}</td>
<td>${p.ax}</td>
<td>${p.ay}</td>
<td>${p.az}</td>
<td>${f}</td>
`

tr.onclick=()=>highlightPoint(id,p)

tbody.appendChild(tr)

rowById[id]=tr
pointById[id]=p

id++

}

map.getSource("points").setData(featureCollection)

}

reader.readAsText(flights[f])

}

}



function highlightPoint(id,p){

for(let r in rowById){

rowById[r].classList.remove("highlight")

}

rowById[id].classList.add("highlight")

rowById[id].scrollIntoView({block:"center"})

map.setFilter("highlight",["==","id",id])

map.flyTo({
center:[p.lon,p.lat],
zoom:18
})

}



function zoomToFlights(){

let bounds=new maplibregl.LngLatBounds()

featureCollection.features.forEach(f=>{
bounds.extend(f.geometry.coordinates)
})

map.fitBounds(bounds,{padding:40})

}

</script>

</body>
</html>
