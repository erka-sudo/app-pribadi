<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drone MRK QC Tool</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
display:flex;
gap:10px;
}

.left{
width:300px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.right{
flex:1;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
}

th{
background:#eee;
}

.red{
color:red;
}

.flight{
cursor:pointer;
padding:5px;
border-bottom:1px solid #ddd;
}

.flight:hover{
background:#eee;
}

</style>
</head>

<body>

<h2>Drone MRK QC Tool</h2>

<input type="file" id="folder" webkitdirectory multiple>

Threshold
<input id="threshold" value="0.05" size="6">

<button onclick="loadProject()">Load Project</button>

<br><br>

<div class="container">

<div class="left">

<h3>Flight List</h3>

<div id="flightList"></div>

</div>

<div class="right">

<div id="plot" style="height:400px;"></div>

<h3>QC Table</h3>

<table id="table">

<thead>
<tr>
<th>file</th>
<th>lat</th>
<th>lon</th>
<th>alt</th>
<th>acc_x</th>
<th>acc_y</th>
<th>acc_z</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let flights={}

function loadProject(){

const files=document.getElementById("folder").files

flights={}

for(let file of files){

if(!file.name.toUpperCase().endsWith(".MRK")) continue

const path=file.webkitRelativePath
const flight=path.split("/")[0]

if(!flights[flight]) flights[flight]=[]

const reader=new FileReader()

reader.onload=function(e){

parseMRK(e.target.result,flight)

}

reader.readAsText(file)

}

setTimeout(buildFlightList,500)

}

function parseMRK(text,flight){

const lines=text.split("\n")

for(let line of lines){

const latMatch=line.match(/(-?\d+\.\d+),Lat/)
const lonMatch=line.match(/(-?\d+\.\d+),Lon/)
const altMatch=line.match(/(-?\d+\.\d+),Ellh/)
const accMatch=line.match(/(\d+\.\d+),\s*(\d+\.\d+),\s*(\d+\.\d+)/)

if(!latMatch) continue

const parts=line.trim().split(/\s+/)

const file=parts[0]

const lat=parseFloat(latMatch[1])
const lon=parseFloat(lonMatch[1])
const alt=parseFloat(altMatch[1])

const ax=parseFloat(accMatch[1])
const ay=parseFloat(accMatch[2])
const az=parseFloat(accMatch[3])

if(!flights[flight]) flights[flight]=[]

flights[flight].push({

file:file,
lat:lat,
lon:lon,
alt:alt,
ax:ax,
ay:ay,
az:az

})

}

}

function buildFlightList(){

const div=document.getElementById("flightList")

div.innerHTML=""

for(let f in flights){

const el=document.createElement("div")

el.className="flight"
el.innerText=f

el.onclick=function(){

plotFlight(f)

}

div.appendChild(el)

}

}

function plotFlight(flight){

const data=flights[flight]

const threshold=parseFloat(document.getElementById("threshold").value)

let lat=[]
let lon=[]
let colors=[]

const tbody=document.querySelector("#table tbody")
tbody.innerHTML=""

for(let r of data){

const acc=Math.max(r.ax,r.ay,r.az)

lat.push(r.lat)
lon.push(r.lon)

colors.push(acc<=threshold?"green":"red")

let tr=document.createElement("tr")

if(acc>threshold) tr.className="red"

tr.innerHTML=`
<td>${r.file}</td>
<td>${r.lat}</td>
<td>${r.lon}</td>
<td>${r.alt}</td>
<td>${r.ax}</td>
<td>${r.ay}</td>
<td>${r.az}</td>
`

tbody.appendChild(tr)

}

Plotly.newPlot("plot",[{

x:lon,
y:lat,
mode:"markers+lines",
marker:{color:colors,size:6}

}],{

xaxis:{title:"Longitude"},
yaxis:{title:"Latitude",scaleanchor:"x"}

})

}

</script>

</body>
</html>
