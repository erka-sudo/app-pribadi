```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drone QC Tool</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
display:flex;
gap:10px;
}

.left{
width:320px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.right{
flex:1;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.flight{
padding:6px;
cursor:pointer;
border-bottom:1px solid #ddd;
}

.flight:hover{
background:#eee;
}

.selected{
background:#cde3ff;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
}

.red{
color:red;
}

</style>
</head>

<body>

<h2>Drone QC Tool</h2>

<input type="file" id="folder" webkitdirectory multiple>

Threshold
<input id="threshold" value="0.05" size="6">

<button onclick="loadProject()">Open Project</button>

<br><br>

<div class="container">

<div class="left">

<h3>Flight List</h3>

<div id="flightList"></div>

</div>

<div class="right">

<div id="plot" style="height:450px;"></div>

<h3>QC Table</h3>

<table id="table">

<thead>
<tr>
<th>file</th>
<th>lat</th>
<th>lon</th>
<th>alt</th>
<th>acc_x</th>
<th>acc_y</th>
<th>acc_z</th>
<th>flight</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let flights={}
let selectedFlights=new Set()

function loadProject(){

const files=document.getElementById("folder").files

flights={}

for(let file of files){

if(file.name.endsWith(".MRK")){

let flight=file.webkitRelativePath.split("/")[0]

if(!flights[flight]) flights[flight]={mrk:null,jpgs:[]}

flights[flight].mrk=file

}

if(file.name.endsWith("_V.JPG")){

let flight=file.webkitRelativePath.split("/")[0]

if(!flights[flight]) flights[flight]={mrk:null,jpgs:[]}

flights[flight].jpgs.push(file.name)

}

}

for(let f in flights){

flights[f].jpgs.sort()

}

readMRK()

}

function readMRK(){

for(let f in flights){

let file=flights[f].mrk

if(!file) continue

const reader=new FileReader()

reader.onload=function(e){

parseMRK(e.target.result,f)

}

reader.readAsText(file)

}

setTimeout(buildFlightList,500)

}

function parseMRK(text,flight){

const lines=text.split("\n")

flights[flight].points=[]

for(let line of lines){

const lat=line.match(/(-?\d+\.\d+),Lat/)
const lon=line.match(/(-?\d+\.\d+),Lon/)
const alt=line.match(/(-?\d+\.\d+),Ellh/)
const acc=line.match(/(\d+\.\d+),\s*(\d+\.\d+),\s*(\d+\.\d+)/)

if(!lat) continue

flights[flight].points.push({

file:null,
lat:parseFloat(lat[1]),
lon:parseFloat(lon[1]),
alt:parseFloat(alt[1]),
ax:parseFloat(acc[1]),
ay:parseFloat(acc[2]),
az:parseFloat(acc[3])

})

}

let jpgs=flights[flight].jpgs

for(let i=0;i<Math.min(jpgs.length,flights[flight].points.length);i++){

flights[flight].points[i].file=jpgs[i]

}

}

function buildFlightList(){

const div=document.getElementById("flightList")

div.innerHTML=""

for(let f in flights){

let el=document.createElement("div")

el.className="flight"

el.innerText=f

el.onclick=function(){

toggleFlight(f,el)

}

div.appendChild(el)

}

}

function toggleFlight(f,el){

if(selectedFlights.has(f)){

selectedFlights.delete(f)

el.classList.remove("selected")

}else{

selectedFlights.add(f)

el.classList.add("selected")

}

plotFlights()

}

function plotFlights(){

let lat=[]
let lon=[]
let colors=[]

const threshold=parseFloat(document.getElementById("threshold").value)

const tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

for(let f of selectedFlights){

let data=flights[f].points

for(let r of data){

let acc=Math.max(r.ax,r.ay,r.az)

lat.push(r.lat)
lon.push(r.lon)

colors.push(acc<=threshold?"green":"red")

let tr=document.createElement("tr")

if(acc>threshold) tr.className="red"

tr.innerHTML=`
<td>${r.file||""}</td>
<td>${r.lat}</td>
<td>${r.lon}</td>
<td>${r.alt}</td>
<td>${r.ax}</td>
<td>${r.ay}</td>
<td>${r.az}</td>
<td>${f}</td>
`

tbody.appendChild(tr)

}

}

Plotly.newPlot("plot",[{

x:lon,
y:lat,
mode:"markers+lines",
marker:{color:colors,size:6}

}],{

xaxis:{title:"Longitude"},
yaxis:{title:"Latitude",scaleanchor:"x"},
dragmode:"pan"

})

}

</script>

</body>
</html>
```
