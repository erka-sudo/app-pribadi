<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Drone QC Tool</title>

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f2f2;}

.topbar{
background:white;
padding:10px;
border-bottom:1px solid #ccc;

display:flex;
flex-wrap:wrap;
align-items:center;
gap:10px;
}

.topbar-group{
display:flex;
align-items:center;
gap:8px;
}

.topbar-right{
margin-left:auto;
display:flex;
align-items:center;
gap:10px;
}

.info{
font-size:13px;
color:#333;
font-weight:bold;
}

.layout{
display:flex;
height:calc(100vh - 60px);
}

.qcPanel{
width:35%;
overflow:auto;
background:white;
border-right:1px solid #ccc;
}

.right{
flex:1;
display:flex;
flex-direction:column;
}

#map{flex:3;}

.flightPanel{
flex:1;
overflow:auto;
background:white;
border-top:1px solid #ccc;
padding:10px;
}

.flight{
padding:6px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.flight:hover{background:#eee;}

.selected{background:#cde3ff;}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
}

.red{color:red;}

.highlight{
background:#fff2a8;
}

</style>

</head>


<body>

<div class="topbar">

<div class="topbar-group">
<input type="file" id="folder" webkitdirectory multiple>
<span class="info" id="totalFile">0 files</span>
<span class="info" id="fileCount">0 JPG</span>
</div>

<div class="topbar-group">
Threshold
<input id="threshold" value="0.05" size="6">
</div>

<div class="topbar-group">
<button onclick="loadProject()">Open Project</button>
<button onclick="zoomToFlights()">Zoom to Flight</button>
<button onclick="selectAllFlights()">Select All</button>
<button onclick="unselectAllFlights()">Unselect All</button>
</div>

<div class="topbar-right">
Point Size
<input type="range" id="pointSize" min="4" max="16" value="6">
</div>

</div>


<div class="layout">

<div class="qcPanel">

<h3 style="margin:10px">QC Table</h3>

<table id="table">

<thead>
<tr>
<th>file</th>
<th>lat</th>
<th>lon</th>
<th>alt</th>
<th>acc_x</th>
<th>acc_y</th>
<th>acc_z</th>
<th>flight</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<div class="right">

<div id="map"></div>

<div class="flightPanel">

<h3>Flight List</h3>
<div id="flightList"></div>

</div>

</div>

</div>


<script>

let flights={}
let selectedFlights=new Set()

let map
let rowById={}
let pointById={}
let highlightId=null

function initMap(){

map=new maplibregl.Map({

container:"map",

style:{
version:8,
sources:{
osm:{
type:"raster",
tiles:[
"https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
],
tileSize:256
}
},

layers:[
{
id:"osm",
type:"raster",
source:"osm"
}
]

},

center:[102.77,-2.08],
zoom:14

})

map.on("load",()=>{

map.addSource("points",{
type:"geojson",
data:{type:"FeatureCollection",features:[]}
})

map.addLayer({
id:"points",
type:"circle",
source:"points",
paint:{
"circle-radius":6,
"circle-color":[
"case",
[">",["get","acc"],0.05],
"#ff0000",
"#00ff00"
],
"circle-stroke-width":1,
"circle-stroke-color":"#000"
}
})

map.addLayer({
id:"points-highlight",
type:"circle",
source:"points",
paint:{
"circle-radius":10,
"circle-color":"#ffff00",
"circle-stroke-width":2,
"circle-stroke-color":"#000"
},
filter:["==",["get","id"],-1]
})

map.on("click","points",function(e){

let id=e.features[0].properties.id
highlightPoint(id)

})

})

}

initMap()

document.getElementById("pointSize").addEventListener("input",drawFlights)
document.getElementById("threshold").addEventListener("input",drawFlights)


function getFlightName(path){

let parts=path.split("/")
return parts[parts.length-2]

}

document.getElementById("folder").addEventListener("change", function(){

let files = this.files
let jpgCount = 0

for(let f of files){
if(f.name.toUpperCase().endsWith(".JPG")){
jpgCount++
}
}

document.getElementById("fileCount").innerText = jpgCount + " JPG"
document.getElementById("totalFile").innerText = files.length + " files"

})

let total = files.length
document.getElementById("fileCount").innerText =
`${jpgCount} JPG / ${total} total`
  
function loadProject(){

const files=document.getElementById("folder").files

flights={}
selectedFlights.clear()

for(let file of files){

if(file.name.endsWith(".MRK")){

let flight=getFlightName(file.webkitRelativePath)

if(!flights[flight]) flights[flight]={mrk:null,jpgs:[],points:[]}

flights[flight].mrk=file

}

if(file.name.endsWith("_V.JPG")){

let flight=getFlightName(file.webkitRelativePath)

if(!flights[flight]) flights[flight]={mrk:null,jpgs:[],points:[]}

flights[flight].jpgs.push(file.name)

}

}

readMRK()

}


function sortJPG(list){

return list.sort((a,b)=>{

let na=parseInt(a.split("_")[2])
let nb=parseInt(b.split("_")[2])
return na-nb

})

}


function readMRK(){

for(let f in flights){

flights[f].jpgs=sortJPG(flights[f].jpgs)

let reader=new FileReader()

reader.onload=function(e){

parseMRK(e.target.result,f)

}

reader.readAsText(flights[f].mrk)

}

setTimeout(buildFlightList,500)

}


function parseMRK(text,flight){

let lines=text.split("\n")

let points=[]

for(let line of lines){

let lat=line.match(/(-?\d+\.\d+),Lat/)
let lon=line.match(/(-?\d+\.\d+),Lon/)
let alt=line.match(/(-?\d+\.\d+),Ellh/)
let acc=line.match(/(\d+\.\d+),\s*(\d+\.\d+),\s*(\d+\.\d+)/)

if(!lat) continue

points.push({

lat:parseFloat(lat[1]),
lon:parseFloat(lon[1]),
alt:parseFloat(alt[1]),
ax:parseFloat(acc[1]),
ay:parseFloat(acc[2]),
az:parseFloat(acc[3])

})

}

flights[flight].points=points

}


function buildFlightList(){

const div=document.getElementById("flightList")
div.innerHTML=""

for(let f in flights){

let el=document.createElement("div")

el.className="flight"
let jumlahFoto = flights[f].jpgs.length
el.innerText = `${f} (${jumlahFoto})`

el.onclick=function(){

if(selectedFlights.has(f)){
selectedFlights.delete(f)
el.classList.remove("selected")
}else{
selectedFlights.add(f)
el.classList.add("selected")
}

drawFlights()

}

div.appendChild(el)

}

}


function drawFlights(){

let threshold=parseFloat(document.getElementById("threshold").value)
let size=parseInt(document.getElementById("pointSize").value)

let features=[]

let tbody=document.querySelector("#table tbody")
tbody.innerHTML=""

rowById={}
pointById={}

let id=0

for(let f of selectedFlights){

let jpgs=flights[f].jpgs

for(let i=0;i<flights[f].points.length;i++){

let p=flights[f].points[i]

let acc=Math.max(p.ax,p.ay,p.az)

let fileName=jpgs[i] || ""

features.push({
type:"Feature",
geometry:{type:"Point",coordinates:[p.lon,p.lat]},
properties:{id:id,acc:acc}
})

let tr=document.createElement("tr")

if(acc>threshold) tr.classList.add("red")

tr.dataset.id=id

tr.innerHTML=`
<td>${fileName}</td>
<td>${p.lat}</td>
<td>${p.lon}</td>
<td>${p.alt}</td>
<td>${p.ax}</td>
<td>${p.ay}</td>
<td>${p.az}</td>
<td>${f}</td>
`

tbody.appendChild(tr)

rowById[id]=tr
pointById[id]=p

tr.addEventListener("click",function(){

highlightPoint(parseInt(this.dataset.id))

})

id++

}

}

map.getSource("points").setData({
type:"FeatureCollection",
features:features
})

map.setPaintProperty("points","circle-radius",size)

map.setPaintProperty("points","circle-color",[
"case",
[">",["get","acc"],threshold],
"#ff0000",
"#00ff00"
])

}


function highlightPoint(id){

highlightId=id

map.setFilter("points-highlight",["==",["get","id"],id])

for(let r in rowById){
rowById[r].classList.remove("highlight")
}

rowById[id].classList.add("highlight")
rowById[id].scrollIntoView({block:"center"})

let p=pointById[id]

map.flyTo({
center:[p.lon,p.lat],
zoom:16
})

}


function zoomToFlights(){

let bounds=new maplibregl.LngLatBounds()

for(let f of selectedFlights){

for(let p of flights[f].points){

bounds.extend([p.lon,p.lat])

}

}

if(!bounds.isEmpty()){
map.fitBounds(bounds,{padding:40})
}

}


function selectAllFlights(){

for(let f in flights){
selectedFlights.add(f)
}

buildFlightList()
drawFlights()

}


function unselectAllFlights(){

selectedFlights.clear()

buildFlightList()
drawFlights()

}

</script>

</body>
</html>
