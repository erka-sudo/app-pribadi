```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drone QC Tool</title>

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
display:flex;
gap:10px;
}

.left{
width:320px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
overflow:auto;
height:700px;
}

.right{
flex:1;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.flight{
padding:6px;
cursor:pointer;
border-bottom:1px solid #ddd;
}

.flight:hover{
background:#eee;
}

.selected{
background:#cde3ff;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
}

.red{
color:red;
}

.highlight{
background:#fff2a8 !important;
}

#map{
height:450px;
border:1px solid #ccc;
margin-bottom:10px;
}

</style>
</head>

<body>

<h2>Drone QC Tool</h2>

<input type="file" id="folder" webkitdirectory multiple>

Threshold
<input id="threshold" value="0.05" size="6">

<button onclick="loadProject()">Open Project</button>
<button onclick="zoomToFlights()">Zoom to Flight</button>
<button onclick="selectAllFlights()">Select All</button>
<button onclick="unselectAllFlights()">Unselect All</button>

Point Size
<input type="range" id="pointSize" min="4" max="14" value="6" oninput="drawFlights()">

<br><br>

<div class="container">

<div class="left">

<h3>Flight List</h3>

<div id="flightList"></div>

</div>

<div class="right">

<div id="map"></div>

<h3>QC Table</h3>

<table id="table">

<thead>
<tr>
<th>file</th>
<th>lat</th>
<th>lon</th>
<th>alt</th>
<th>acc_x</th>
<th>acc_y</th>
<th>acc_z</th>
<th>flight</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let flights={}
let selectedFlights=new Set()
let map
let markers=[]
let idMap={}
let lastFlight=null

function initMap(){

map=new maplibregl.Map({

container:"map",

style:{
version:8,
sources:{
osm:{
type:"raster",
tiles:[
"https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
"https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
"https://c.tile.openstreetmap.org/{z}/{x}/{y}.png"
],
tileSize:256
}
},
layers:[
{
id:"osm",
type:"raster",
source:"osm"
}
]
},

center:[102.77,-2.08],
zoom:14

})

}

initMap()

function getFlightName(path){

let parts=path.split("/")

if(parts.length>2) return parts[parts.length-2]

return parts[0]

}

function loadProject(){

const files=document.getElementById("folder").files

flights={}
selectedFlights.clear()

for(let file of files){

if(file.name.endsWith(".MRK")){

let flight=getFlightName(file.webkitRelativePath)

if(!flights[flight]) flights[flight]={mrk:null,jpgs:[],points:[]}

flights[flight].mrk=file

}

if(file.name.endsWith("_V.JPG")){

let flight=getFlightName(file.webkitRelativePath)

if(!flights[flight]) flights[flight]={mrk:null,jpgs:[],points:[]}

flights[flight].jpgs.push(file.name)

}

}

for(let f in flights){

flights[f].jpgs.sort()

}

readMRK()

}

function readMRK(){

for(let f in flights){

let file=flights[f].mrk

if(!file) continue

let reader=new FileReader()

reader.onload=function(e){

parseMRK(e.target.result,f)

}

reader.readAsText(file)

}

setTimeout(buildFlightList,600)

}

function parseMRK(text,flight){

const lines=text.split("\n")

let points=[]

for(let line of lines){

const lat=line.match(/(-?\d+\.\d+),Lat/)
const lon=line.match(/(-?\d+\.\d+),Lon/)
const alt=line.match(/(-?\d+\.\d+),Ellh/)
const acc=line.match(/(\d+\.\d+),\s*(\d+\.\d+),\s*(\d+\.\d+)/)

if(!lat) continue

points.push({

file:null,
lat:parseFloat(lat[1]),
lon:parseFloat(lon[1]),
alt:parseFloat(alt[1]),
ax:parseFloat(acc[1]),
ay:parseFloat(acc[2]),
az:parseFloat(acc[3])

})

}

let jpgs=flights[flight].jpgs

for(let i=0;i<Math.min(points.length,jpgs.length);i++){

points[i].file=jpgs[i]

}

flights[flight].points=points

}

function buildFlightList(){

const div=document.getElementById("flightList")

div.innerHTML=""

for(let f in flights){

let el=document.createElement("div")

el.className="flight"
el.dataset.flight=f
el.innerText=f+" ("+flights[f].points.length+")"

el.onclick=function(e){

toggleFlight(f,el,e)

}

div.appendChild(el)

}

}

function toggleFlight(f,el,event){

if(event.shiftKey && lastFlight){

let list=Object.keys(flights)

let start=list.indexOf(lastFlight)
let end=list.indexOf(f)

let min=Math.min(start,end)
let max=Math.max(start,end)

for(let i=min;i<=max;i++){

selectedFlights.add(list[i])

document.querySelector(`[data-flight="${list[i]}"]`).classList.add("selected")

}

}else{

if(selectedFlights.has(f)){

selectedFlights.delete(f)
el.classList.remove("selected")

}else{

selectedFlights.add(f)
el.classList.add("selected")

}

}

lastFlight=f

drawFlights()

}

function selectAllFlights(){

selectedFlights.clear()

document.querySelectorAll(".flight").forEach(el=>{

selectedFlights.add(el.dataset.flight)
el.classList.add("selected")

})

drawFlights()

}

function unselectAllFlights(){

selectedFlights.clear()

document.querySelectorAll(".flight").forEach(el=>{

el.classList.remove("selected")

})

drawFlights()

}

function clearMarkers(){

for(let m of markers) m.remove()

markers=[]

}

function drawFlights(){

clearMarkers()

let size=document.getElementById("pointSize").value
let threshold=parseFloat(document.getElementById("threshold").value)

const tbody=document.querySelector("#table tbody")
tbody.innerHTML=""

idMap={}

let id=0

for(let f of selectedFlights){

let data=flights[f].points

for(let p of data){

let acc=Math.max(p.ax,p.ay,p.az)

let color = acc>threshold ? "red" : "lime"

let el=document.createElement("div")

el.style.width=size+"px"
el.style.height=size+"px"
el.style.borderRadius="50%"
el.style.background=color
el.style.cursor="pointer"

idMap[id]=p

el.onclick=function(){

highlightRow(id)

map.flyTo({
center:[p.lon,p.lat],
zoom:18
})

}

let marker=new maplibregl.Marker(el)
.setLngLat([p.lon,p.lat])
.addTo(map)

markers.push(marker)

let tr=document.createElement("tr")

tr.dataset.id=id

if(acc>threshold) tr.classList.add("red")

tr.innerHTML=`
<td>${p.file||""}</td>
<td>${p.lat}</td>
<td>${p.lon}</td>
<td>${p.alt}</td>
<td>${p.ax}</td>
<td>${p.ay}</td>
<td>${p.az}</td>
<td>${f}</td>
`

tr.onclick=function(){

highlightRow(id)

map.flyTo({
center:[p.lon,p.lat],
zoom:18
})

}

tbody.appendChild(tr)

id++

}

}

}

function highlightRow(id){

let rows=document.querySelectorAll("#table tbody tr")

rows.forEach(r=>r.classList.remove("highlight"))

let row=document.querySelector(`#table tbody tr[data-id='${id}']`)

if(row){

row.classList.add("highlight")

row.scrollIntoView({block:"center"})

}

}

function zoomToFlights(){

let bounds=new maplibregl.LngLatBounds()

for(let f of selectedFlights){

for(let p of flights[f].points){

bounds.extend([p.lon,p.lat])

}

}

if(!bounds.isEmpty()){

map.fitBounds(bounds,{padding:40})

}

}

</script>

</body>
</html>
```
