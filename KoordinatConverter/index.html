<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coordinate Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body{font-family:Arial;background:#f2f2f2;padding:40px;}
.box{background:white;padding:25px;max-width:750px;margin:auto;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.1);}
input,select,button{width:100%;padding:10px;margin-top:10px;}
textarea{width:100%;height:120px;margin-top:10px;}
button{background:#2b7cff;color:white;border:none;cursor:pointer;}
button:hover{background:#1a5fd0;}
#result{margin-top:20px;white-space:pre;font-family:monospace;}
.sample{font-size:13px;color:#555;margin-top:5px;}
</style>
</head>

<body>

<div class="box">

<h2>Coordinate Converter (QC Version)</h2>

<label>From</label>
<select id="from" onchange="updateSampleLink()">
<option value="geo">Geodetic Decimal</option>
<option value="utm">UTM</option>
<option value="tm3">TM3</option>
</select>

<label>To</label>
<select id="to">
<option value="geo">Geodetic Decimal</option>
<option value="utm">UTM</option>
<option value="tm3">TM3</option>
</select>

<textarea id="manual" placeholder="-2.070877130,102.772954818"></textarea>

<label>Zone (UTM atau TM3)</label>
<input id="zone" placeholder="48 atau 48.1">

<button onclick="convertManual()">Convert</button>

<hr>

<input type="file" id="csv">

<div class="sample" id="sampleLink"></div>

<button onclick="convertCSV()">Convert CSV</button>

<div id="result"></div>

</div>

<script>

// =====================
// SAMPLE CSV DOWNLOAD
// =====================
function updateSampleLink(){

let from = document.getElementById("from").value;
let link = document.getElementById("sampleLink");

if(from==="geo"){
link.innerHTML = '<a href="#" onclick="downloadSample(\'geo\')">Download contoh CSV Geodetik</a>';
}
else if(from==="utm"){
link.innerHTML = '<a href="#" onclick="downloadSample(\'utm\')">Download contoh CSV UTM</a>';
}
else if(from==="tm3"){
link.innerHTML = '<a href="#" onclick="downloadSample(\'tm3\')">Download contoh CSV TM3</a>';
}

}

function downloadSample(type){

let content = "";

if(type==="geo"){
content = "lat,lon\n-2.070877,102.772954\n-2.071000,102.773200";
}
if(type==="utm"){
content = "x,y\n222745,9829000\n223000,9830000";
}
if(type==="tm3"){
content = "x,y\n120000,1500000\n130000,1502000";
}

let blob = new Blob([content]);
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "sample_"+type+".csv";
a.click();

}

// =====================
// PARSE ZONE
// =====================
function parseZoneInput(){

let z = document.getElementById("zone").value.trim();

if(!z){
return {error:"Zona kosong"};
}

if(z.includes(".")){
let parts = z.split(".");
let base = parseInt(parts[0]);
let sub = parts[1];

if((sub==="1" || sub==="2") && !isNaN(base)){
return {type:"tm3", zone:z};
}

return {error:"Format TM3 salah (harus .1 atau .2)"};
}

let num = parseInt(z);

if(!isNaN(num)){
return {type:"utm", zone:num};
}

return {error:"Zona tidak valid"};

}

// =====================
// UTM
// =====================
function buildUTMproj(zone, lat){
let south = lat < 0 ? " +south" : "";
return "+proj=utm +zone="+zone+south+" +datum=WGS84 +units=m +no_defs";
}

function autoUTMzone(lon){
return Math.floor((lon + 180)/6) + 1;
}

// =====================
// TM3
// =====================
function parseTM3zone(zoneStr){
let parts = zoneStr.split(".");
let zone = parseInt(parts[0]);
let sub = parts[1];

let cm_utm = zone * 6 - 183;

if(sub==="1") return cm_utm - 1.5;
if(sub==="2") return cm_utm + 1.5;

return null;
}

function getTM3zone(lon){
let z = autoUTMzone(lon);
let cm = z*6 - 183;
let sub = lon < cm ? ".1" : ".2";
return z + sub;
}

function buildTM3proj(cm){
return "+proj=tmerc +lat_0=0 +lon_0="+cm+
" +k=0.9999 +x_0=200000 +y_0=1500000 +datum=WGS84 +units=m +no_defs";
}

// =====================
// QC
// =====================
function validateGeo(lat, lon){
let msg="";
if(lat<-90||lat>90) msg+="Lat error | ";
if(lon<-180||lon>180) msg+="Lon error | ";
return msg;
}

function validateUTM(e,n){
let msg="";
if(e<100000||e>900000) msg+="Easting error | ";
if(n<0||n>10000000) msg+="Northing error | ";
return msg;
}

function validateTM3(e,n){
let msg="";
if(e<0||e>400000) msg+="Easting TM3 error | ";
if(n<1000000||n>2000000) msg+="Northing TM3 error | ";
return msg;
}

// =====================
// ENGINE
// =====================
function convertPoint(a,b,from,to){

let warn="";
let z = parseZoneInput();

if(z.error && from!=="geo") return z.error;

if(from==="geo"){
warn+=validateGeo(a,b);
}

// GEO → UTM
if(from==="geo" && to==="utm"){
let zone=autoUTMzone(b);
let p=proj4("EPSG:4326",buildUTMproj(zone,a),[b,a]);
warn+=validateUTM(p[0],p[1]);
return p[0].toFixed(3)+","+p[1].toFixed(3)+" (UTM "+zone+") | "+warn;
}

// UTM → GEO
if(from==="utm" && to==="geo"){
let p=proj4(buildUTMproj(z.zone,-1),"EPSG:4326",[a,b]);
return p[1].toFixed(8)+","+p[0].toFixed(8);
}

// GEO → TM3
if(from==="geo" && to==="tm3"){
let zone=getTM3zone(b);
let cm=parseTM3zone(zone);
let p=proj4("EPSG:4326",buildTM3proj(cm),[b,a]);
return p[0].toFixed(3)+","+p[1].toFixed(3)+" (TM3 "+zone+")";
}

// TM3 → GEO
if(from==="tm3" && to==="geo"){
let cm=parseTM3zone(z.zone);
let p=proj4(buildTM3proj(cm),"EPSG:4326",[a,b]);
return p[1].toFixed(8)+","+p[0].toFixed(8);
}

return "conversion not defined";
}

// =====================
// MANUAL
// =====================
function convertManual(){

let lines=document.getElementById("manual").value.trim().split("\n");
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;

let out="";

lines.forEach(l=>{
let p=l.split(",");
let a=parseFloat(p[0]);
let b=parseFloat(p[1]);
if(isNaN(a)||isNaN(b)) return;
out+=l+" → "+convertPoint(a,b,from,to)+"\n";
});

document.getElementById("result").innerText=out;

}

// =====================
// CSV
// =====================
function convertCSV(){

let file=document.getElementById("csv").files[0];
if(!file){ alert("Pilih file CSV"); return; }

Papa.parse(file,{
header:true,
skipEmptyLines:true,
complete:function(res){

let data=res.data;
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;

let out=[];

data.forEach(r=>{

let v1=parseFloat(r.lat||r.y||r.x);
let v2=parseFloat(r.lon||r.x||r.y);

if(isNaN(v1)||isNaN(v2)) return;

let conv=convertPoint(v1,v2,from,to);

out.push(v1+","+v2+" → "+conv);

});

document.getElementById("result").innerText=out.join("\n");

downloadCSV(out);

}
});
}

// =====================
function downloadCSV(rows){
let csv="result\n";
rows.forEach(r=>csv+=r+"\n");

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="converted.csv";
a.click();
}

// init
updateSampleLink();

</script>

</body>
</html>
