<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Drone Weather Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-4">

<h1 class="text-center mb-4">Drone Weather Dashboard</h1>

<div class="text-center mb-3">

<button class="btn btn-primary" onclick="getGPS()">📍 Gunakan GPS</button>
<button class="btn btn-secondary" onclick="enablePickLocation()">🗺 Pilih Lokasi</button>

</div>

<div class="card shadow mb-4">

<div class="card-body text-center">

<h4 id="location">Loading...</h4>
<h1 id="temp">--°C</h1>

<p id="condition"></p>
<p id="wind"></p>

<h4 id="drone"></h4>

</div>

</div>

<div class="text-center mb-3">

<button onclick="setMode('wind')" class="btn btn-info">🌬 Wind</button>
<button onclick="setMode('cloud')" class="btn btn-secondary">☁ Cloud</button>
<button onclick="setMode('rain')" class="btn btn-primary">🌧 Rain</button>

</div>

<canvas id="weatherCanvas"></canvas>

</div>

<script src="app.js"></script>

</body>
</html>
