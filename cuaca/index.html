<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Drone Weather PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-4">

<h1 class="text-center mb-4">Drone Weather PRO</h1>

<div class="text-center mb-3">
<button class="btn btn-primary" onclick="getGPS()">📍 GPS</button>
</div>

<div class="card mb-4 text-center p-3">

<h4 id="location"></h4>
<h1 id="temp"></h1>
<p id="condition"></p>
<p id="wind"></p>
<h4 id="drone"></h4>

</div>

<div class="text-center mb-2">
<button onclick="setMode('wind')" class="btn btn-info">🌬 Wind</button>
<button onclick="setMode('rain')" class="btn btn-primary">🌧 Rain</button>
</div>

<div id="map"></div>
<canvas id="windCanvas"></canvas>

</div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="app.js"></script>

</body>
</html>
