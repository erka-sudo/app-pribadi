<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Weather Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="rain"></div>

<div class="container py-4">

<h1 class="text-center mb-4">Weather Dashboard</h1>

<div class="text-center mb-3">

<button class="btn btn-primary" onclick="getGPS()">📍 Gunakan GPS</button>

<button class="btn btn-secondary" onclick="enablePickLocation()">🗺 Pilih Lokasi di Peta</button>

</div>

<div class="card shadow mb-4">
<div class="card-body text-center">

<h4 id="location">Loading...</h4>

<h1 id="temp">--°C</h1>

<p id="condition"></p>
<p id="wind"></p>

</div>
</div>

<ul class="nav nav-tabs mb-3">

<li class="nav-item">
<button class="nav-link active" onclick="showMode('hourly')">Per Jam</button>
</li>

<li class="nav-item">
<button class="nav-link" onclick="showMode('3hour')">3 Jam</button>
</li>

<li class="nav-item">
<button class="nav-link" onclick="showMode('6hour')">6 Jam</button>
</li>

<li class="nav-item">
<button class="nav-link" onclick="showMode('daily')">Harian</button>
</li>

</ul>

<div id="forecast" class="row g-3"></div>

<h3 class="mt-5">Radar Hujan</h3>

<div id="map"></div>

</div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script src="app.js"></script>

</body>
</html>
