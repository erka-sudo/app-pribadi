<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Drone Weather Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-4">

<h1 class="text-center mb-4">Drone Weather Dashboard</h1>

<div class="text-center mb-3">
<button class="btn btn-primary" onclick="getGPS()">📍 Gunakan GPS</button>
<button class="btn btn-secondary" onclick="enablePickLocation()">🗺 Pilih Lokasi di Peta</button>
</div>

<div class="card weather-card shadow mb-4">
<div class="card-body text-center">

<h4 id="location">Loading...</h4>
<h1 id="temp">--°C</h1>

<p id="condition" class="info-line"></p>
<p id="wind" class="info-line"></p>
<p id="rainStatus" class="info-line"></p>
<p id="cloudStatus" class="info-line"></p>
<p id="gustStatus" class="info-line"></p>

<h4 id="drone"></h4>
<p id="loadingText" class="loading-text"></p>

</div>
</div>

<div class="mode-toolbar text-center mb-3">
<button id="btnWind" class="mode-btn active-mode" onclick="setMode('wind')">🌬 Angin Real</button>
<button id="btnRain" class="mode-btn" onclick="setMode('rain')">🌧 Hujan Real</button>
</div>

<div class="text-center mb-2">
<div id="modeInfo" class="mode-info"></div>
</div>

<div id="mapWrap">
<div id="map"></div>
<canvas id="weatherCanvas"></canvas>
</div>

</div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="app.js"></script>
</body>
</html>
